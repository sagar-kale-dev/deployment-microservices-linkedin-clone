version: "3.8"

services:
  # ---------------- Kafka ----------------
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    restart: always
    networks:
      - linkedin-network
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

  kafbat-ui:
    container_name: kafbat-ui
    image: ghcr.io/kafbat/kafka-ui:latest
    restart: always
    ports:
      - "8090:8080"
    networks:
      - linkedin-network
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_KSQLDBSERVER: http://ksqldb0:8088

  # ---------------- Databases ----------------
  users-db:
    image: postgres:16
    container_name: users-db
    restart: always
    environment:
      POSTGRES_DB: linkedin_users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    networks:
      - linkedin-network
    volumes:
      - users-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  posts-db:
    image: postgres:16
    container_name: posts-db
    restart: always
    environment:
      POSTGRES_DB: linkedin_posts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    networks:
      - linkedin-network
    volumes:
      - posts-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  notifications-db:
    image: postgres:16
    container_name: notifications-db
    restart: always
    environment:
      POSTGRES_DB: linkedin_notifications
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    networks:
      - linkedin-network
    volumes:
      - notifications-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  connections-db:
    image: neo4j:latest
    container_name: connections-db
    restart: always
    environment:
      NEO4J_AUTH: neo4j/LinkedInGraphDB
    networks:
      - linkedin-network
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - connections-db-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------- Discovery & Gateway ----------------
  discovery-server:
    image: sagar855/linkedin-app-discovery-server
    container_name: discovery-server
    restart: always
    networks:
      - linkedin-network
    ports:
      - "8761:8761"

  api-gateway:
    image: sagar855/linkedin-app-api-gateway
    container_name: api-gateway
    restart: always
    networks:
      - linkedin-network
    ports:
      - "8080:8080"
    depends_on:
      - discovery-server

  # ---------------- Microservices ----------------
  users-service:
    image: sagar855/linkedin-app-users-service
    container_name: users-service
    restart: always
    networks:
      - linkedin-network
    depends_on:
      - users-db
      - discovery-server
      - kafka

  posts-service:
    image: sagar855/linkedin-app-posts-service
    container_name: posts-service
    restart: always
    networks:
      - linkedin-network
    depends_on:
      - posts-db
      - discovery-server
      - kafka

  notifications-service:
    image: sagar855/linkedin-app-notifications-service
    container_name: notifications-service
    restart: always
    networks:
      - linkedin-network
    depends_on:
      - notifications-db
      - discovery-server
      - kafka

  connections-service:
    image: sagar855/linkedin-app-connections-service
    container_name: connections-service
    restart: always
    networks:
      - linkedin-network
    depends_on:
      - connections-db
      - discovery-server
      - kafka

# ---------------- Networks & Volumes ----------------
networks:
  linkedin-network:

volumes:
  kafka_data:
  users-db-data:
  posts-db-data:
  notifications-db-data:
  connections-db-data:
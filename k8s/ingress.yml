apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myingress
  namespace: default
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
        - path: /kafka-ui
          pathType: Prefix
          backend:
            service:
              name: kafka-ui-service
              port:
                number: 8080

        - path: /
          pathType: Prefix
          backend:
            service:
              name: api-gateway
              port:
                number: 80


apiVersion: v1
kind: Service
metadata:
  name: kafka
  labels:
    app: kafka
spec:
  clusterIP: None
  selector:
    app: kafka
  ports:
  - name: tcp-kafka-int
    port: 9092
    targetPort: tcp-kafka-int
  - name: tcp-kafka-ctrl
    port: 29093
    targetPort: tcp-kafka-ctrl

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  labels:
    app: kafka
spec:
  serviceName: kafka
  replicas: 1
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: kafka

  template:
    metadata:
      labels:
        app: kafka

    spec:
      securityContext:
        fsGroup: 1000

      containers:
      - name: kafka
        image: docker.io/confluentinc/confluent-local:7.5.0
        imagePullPolicy: IfNotPresent

        command:
        - sh
        - -exc
        - |
          export CLUSTER_ID="6PMpHYL9QkeyXRj9Nrp4KA" && \
          export KAFKA_NODE_ID=0 && \
          export KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-0.kafka:9092 && \
          export KAFKA_CONTROLLER_QUORUM_VOTERS="0@kafka-0.kafka:29093" && \
          exec /etc/confluent/docker/run

        env:
        - name: KAFKA_PROCESS_ROLES
          value: "broker,controller"

        - name: KAFKA_CONTROLLER_LISTENER_NAMES
          value: "CONTROLLER"

        - name: KAFKA_INTER_BROKER_LISTENER_NAME
          value: "PLAINTEXT"

        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"

        - name: KAFKA_LISTENERS
          value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093"

        ports:
        - name: tcp-kafka-int
          containerPort: 9092
        - name: tcp-kafka-ctrl
          containerPort: 29093

        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 200m
            memory: 1Gi

        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL


